name: Build .exe

permissions:
  contents: write

on:
  push:
    branches: [main]
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --break-system-packages pyinstaller

      - name: Show Python and pip versions
        run: |
          python --version
          pip --version

      - name: Check tkinter availability
        run: |
          python -c "import tkinter; print('tkinter OK:', tkinter.TkVersion)"

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed `
            --name "OpenClaw-Setup" `
            --noconfirm `
            openclaw_setup.py

      - name: Verify output
        run: |
          Get-ChildItem dist/ | Format-Table Name, Length
          if (Test-Path dist/*.exe) { Write-Host "EXE found!" } else { Write-Host "No EXE found"; exit 1 }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OpenClaw-Setup
          path: dist/OpenClaw-Setup.exe
          retention-days: 30

      - name: Upload to GitHub Release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/OpenClaw-Setup.exe
          draft: false
          generate_release_notes: true
          tag: v1.0.${{ github.run_number }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
